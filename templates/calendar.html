{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="en">
  <head>
    {% block head %}
      {{super()}}
    {% endblock %}
  </head>
  <body>
    {% block body %}
    {{super()}}
    <div class="container">
      <aside id="aside">
        <div class="buttons">
          <div class="inline"><span></span>
          <button id="closeMobileMenu"><img src="{{url_for('static', filename='images/plus.png')}}" alt="close aside menu" width="30px" height="30px"></button></div>
          <div class="inline"><a class="anim-title" href="/profile">{{user.name}}</a>
            <img src="{{url_for('static', filename='images/blank-avatar.png')}}" width="30px" height="30px"></div>
          <br>
          <a href="#" id="addTask"><div class="inline">
            <p>Добавить задание</p><img src="{{url_for('static', filename='images/plus.png')}}" width="30px" height="30px"></div>
          </a>
          <a href="/classes"><div class="inline"><p>Классы и дети</p>
          <img id="children" src="{{url_for('static', filename='images/class.png')}}" alt="" width="30px" height="30px"></div></a> 
          <a href="#" id="logout"><div class="inline"><p>Выйти</p>
          <img src="{{url_for('static', filename='images/exit.png')}}" width="30px" height="30px">
          </div></a>
          <a href="#" id="loader" style="pointer-events: none"><div class="inline"><p>Загружаем календарь...</p>
            <div class="spin" style="width: 20px; height: 20px"></div></div>
          </a>
        </div>
      </aside>
      <div class="wrapper">
      <nav><button id="mobileMenu" class="menu"><img src="{{url_for('static', filename='images/options.png')}}" width="30px" height="30px" alt="open side menu"></button>
        <span style="font-size: 1.3rem;margin-top:4px;">{{user.name}}</span><a href="/" class="blank">ТВОЙ РИТМ</a></nav>
      <main>
        <div class="tableHeader">
        <button id="prevMonth">&lt;</button>
        <span id="calLabel">Загрузка...</span>
        <button id="nextMonth">&gt;</button>
        </div>
        <div id="calendar">
        </div>
      </main>
      </div>
    </div>
    <script src="{{url_for('static', filename='js/calendar.js')}}"></script>
    <script src="{{url_for('static', filename='js/addTask.js')}}" defer></script>
    {% endblock %}
  </body>
</html>
